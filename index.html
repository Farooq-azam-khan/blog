<!DOCTYPE html>
<html>
  <head>
    <meta http-equiv="Content-type" content="text/html; charset=utf-8"/>
     <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <style>
        /* LaTeX display environment will effect the LaTeX characters but not the layout on the page */
        span.katex-display {
          display: inherit; /* You may comment this out if you want the default behavior */
        }
      </style>
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/katex.min.css" >
      <script defer src="https://cdn.jsdelivr.net/npm/katex@0.12.0/dist/katex.min.js" integrity="sha384-g7c+Jr9ZivxKLnZTDUhnkOnsh30B4H0rpLUpJ4jAIKs4fnJI+sEnkvrMWph2EDg4" crossorigin="anonymous"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.12.0/dist/contrib/auto-render.min.js" integrity="sha384-mll67QQFJfxn0IYznZYonOWZ644AWYC+Pt2cHqMaRhXVrursRwvLnLaebdGIlYNa" crossorigin="anonymous"
      onload="renderMathInElement(document.body);"></script>

    <!-- CUSTOM CODE IMPORTS --> 
    <link rel="stylesheet" href="/build.css" />
    <script src="/elm.js"></script>
    <title>Farooq Azam Khan | Blog</title>
  </head>
  <body>
    <div id="app"></div>
<noscript>
        You need to enable JavaScript to run this app.
    </noscript>
    <!-- Run the app + render LaTeX using KaTeX (note the seperate script tags!) -->
    <script>
        const app = Elm.Main.init({
          node: document.getElementById('app')
        })
      // render the math formulas when the url changes
      app.ports.sendUrlChangedData.subscribe((data) => {
          console.log('changed url...')
            renderMathInElement(document.body, {
              delimiters: [
                {
                  left: "$begin-inline$", 
                  right: "$end-inline$", 
                  display: false
                }, 
                {
                  left: "$begin-display$",
                  right: "$end-display$", 
                  display: true
                }]});

      })
    </script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
        renderMathInElement(document.body, {
          delimiters: [
            {
              left: "$begin-inline$", 
              right: "$end-inline$", 
              display: false
            }, 
            {
              left: "$begin-display$",
              right: "$end-display$", 
              display: true
            }]});
        });
    </script>
  </body>
</html>
